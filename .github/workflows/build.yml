name: Build ESP32-S3 Xiaozhi Firmware
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y git wget flex bison gperf python3 python3-pip python3-venv cmake ninja-build ccache libncurses-dev libssl-dev

      - name: 下载 ESP-IDF v5.3
        run: |
          export IDF_VERSION=v5.3
          git clone --depth 1 --branch $IDF_VERSION https://github.com/espressif/esp-idf.git ~/esp-idf
          cd ~/esp-idf
          ./install.sh esp32s3

      - name: 编译固件（修复配置加载+限制线程）
        run: |
          source ~/esp-idf/export.sh
          idf.py set-target esp32s3
          # 强制使用S3 16MB DIO默认配置
          cp sdkconfig.defaults/sdkconfig.defaults.esp32s3 sdkconfig
          idf.py fullclean
          # 限制并行编译线程防止内存溢出
          idf.py build -j2

      - name: 收集三个bin文件
        run: |
          mkdir -p output_bin
          cp build/bootloader/bootloader.bin output_bin/
          cp build/partition-table.bin output_bin/
          cp build/xiaozhi-esp32.bin output_bin/
          ls -lh output_bin

      - name: 上传固件包
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-firmware-bins
          path: output_bin
