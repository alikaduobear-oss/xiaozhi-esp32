name: Build ESP32-S3 Xiaozhi Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.3.2
    steps:
      - name: 拉取源码 + 完整更新子模块
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 校验关键文件存在
        run: |
          for f in "main/boards/bread-compact-wifi-lcd/config.h" "CMakeLists.txt"; do
            if [ ! -f "$f" ]; then
              echo "::error::缺少关键文件: $f"
              exit 1
            fi
          done

      - name: 配置并编译
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py fullclean
          
          # 生成 sdkconfig
          rm -f sdkconfig
          [ -f "sdkconfig.defaults" ] && cp sdkconfig.defaults sdkconfig
          {
            echo "CONFIG_ESPTOOLPY_FLASHMODE_DIO=y"
            echo "CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y"
            echo "CONFIG_LCD_ST7735_128X160=y"
            echo "CONFIG_BOARD_TYPE_BREAD_COMPACT_WIFI_LCD=y"
          } >> sdkconfig
          
          idf.py defconfig
          idf.py build -j2

      - name: 收集并上传固件
        run: |
          mkdir -p output_bin
          cp build/bootloader/bootloader.bin output_bin/
          cp build/partition-table.bin output_bin/
          cp build/xiaozhi-esp32.bin output_bin/
          ls -lh output_bin

      - name: 上传固件包
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi-firmware
          path: output_bin
