name: Build ESP32-S3 Xiaozhi Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2  # 升级到与原始仓库一致的版本
    steps:
      - name: 拉取源码 + 完整更新子模块
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 校验板型配置文件存在
        run: |
          if [ ! -f "main/boards/bread-compact-wifi-lcd/config.json" ]; then
            echo "::error::缺少 config.json，请确认板型目录完整"
            exit 1
          fi
          if [ ! -f "main/boards/bread-compact-wifi-lcd/config.h" ]; then
            echo "::error::缺少板型文件 main/boards/bread-compact-wifi-lcd/config.h"
            exit 1
          fi

      - name: 使用 release.py 构建固件
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          # release.py 会自动处理 set-target、sdkconfig_append、build
          python scripts/release.py bread-compact-wifi-lcd

      - name: 收集并上传固件
        run: |
          mkdir -p output_bin
          # release.py 会生成 merged-binary.bin
          cp build/merged-binary.bin output_bin/ 2>/dev/null || true
          # 同时收集标准烧录文件
          cp build/bootloader/bootloader.bin output_bin/ 2>/dev/null || true
          cp build/partition-table.bin output_bin/ 2>/dev/null || true
          cp build/xiaozhi-esp32.bin output_bin/ 2>/dev/null || true
          ls -lh output_bin

      - name: 上传固件包
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi-firmware
          path: output_bin
