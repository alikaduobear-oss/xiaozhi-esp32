name: Build ESP32-S3 Firmware
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 安装ESP-IDF环境
        uses: espressif/setup-espressif-idf@v10
        with:
          esp-idf-version: v5.3
          target: esp32s3

      - name: 编译固件
        run: |
          idf.py set-target esp32s3
          idf.py fullclean
          idf.py build

      - name: 收集3个bin文件到输出目录
        run: |
          mkdir -p output
          cp build/bootloader/bootloader.bin output/
          cp build/partition-table.bin output/
          cp build/xiaozhi-esp32.bin output/
          ls output

      - name: 上传固件包到Artifacts（可网页下载）
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-firmware-bin
          path: output/
