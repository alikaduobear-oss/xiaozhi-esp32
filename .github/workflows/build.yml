name: Build ESP32-S3 Xiaozhi Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.3.2   # 使用官方 ESP-IDF 容器，省去安装步骤
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 编译 bread-compact-wifi-lcd 板型
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          # 使用 release.py 编译指定板型，它会自动处理所有配置
          python scripts/release.py bread-compact-wifi-lcd

      - name: 收集固件
        run: |
          mkdir -p output_bin
          cp build/merged-binary.bin output_bin/firmware.bin
          cp build/bootloader/bootloader.bin output_bin/
          cp build/partition-table.bin output_bin/
          ls -lh output_bin

      - name: 上传固件包
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi-bread-compact-wifi-lcd
          path: output_bin
