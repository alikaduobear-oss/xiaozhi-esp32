name: Build ESP32-S3 Xiaozhi Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.3.2
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 检查板型配置
        run: |
          if [ ! -f "main/boards/bread-compact-wifi-lcd/config.h" ]; then
            echo "错误：缺少 bread-compact-wifi-lcd 板型，请先创建"
            exit 1
          fi

      - name: 配置并编译
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          idf.py set-target esp32s3
          
          # 生成 sdkconfig（启用 ST7735 和板型）
          echo "CONFIG_LCD_ST7735_128X160=y" >> sdkconfig.defaults
          echo "CONFIG_BOARD_TYPE_BREAD_COMPACT_WIFI_LCD=y" >> sdkconfig.defaults
          idf.py defconfig
          
          export BOARD_TYPE=bread-compact-wifi-lcd
          idf.py build -j2

      - name: 收集固件
        run: |
          mkdir -p output_bin
          cp build/bootloader/bootloader.bin output_bin/ 2>/dev/null || true
          cp build/partition-table.bin output_bin/ 2>/dev/null || true
          find build -maxdepth 1 -name "*.bin" ! -name "bootloader.bin" ! -name "partition-table.bin" -exec cp {} output_bin/firmware.bin \;
          ls -lh output_bin

      - name: 上传固件包
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi-firmware
          path: output_bin
