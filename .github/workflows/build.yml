name: Build Boards

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build bread-compact-wifi-lcd
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          python scripts/release.py bread-compact-wifi-lcd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_bread-compact-wifi-lcd_${{ github.sha }}
          path: build/merged-binary.bin
          if-no-files-found: error
