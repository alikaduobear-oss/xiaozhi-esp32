name: Build ESP32-S3 Xiaozhi Firmware
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持手动触发编译

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install git wget flex bison gperf python3 python3-pip python3-venv cmake ninja-build ccache libncurses-dev libssl-dev

      - name: Download & Setup ESP-IDF v5.3
        run: |
          export IDF_VERSION=v5.3
          git clone --depth 1 --branch $IDF_VERSION https://github.com/espressif/esp-idf.git ~/esp-idf
          cd ~/esp-idf
          ./install.sh esp32s3
          echo "source ~/esp-idf/export.sh" >> $GITHUB_ENV

      - name: Build firmware
        run: |
          source ~/esp-idf/export.sh
          idf.py set-target esp32s3
          idf.py fullclean
          idf.py build

      - name: Collect bin files
        run: |
          mkdir -p output_bin
          cp build/bootloader/bootloader.bin output_bin/
          cp build/partition-table.bin output_bin/
          cp build/xiaozhi-esp32.bin output_bin/
          ls -lh output_bin

      - name: Upload bin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-firmware-bins
          path: output_bin
